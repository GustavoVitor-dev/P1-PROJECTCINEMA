<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Sessões · CineSystem</title>
  <link href="./css/bootstrap.min.css" rel="stylesheet">
  <link href="./css/main-styles.css" rel="stylesheet">
</head>
<body>

  <!-- ===== Navbar ===== -->
  <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">🎬 CineSystem</a>
      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto gap-1">
          <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
          <li class="nav-item"><a class="nav-link" href="cadastro-filmes.html">Filmes</a></li>
          <li class="nav-item"><a class="nav-link" href="cadastro-salas.html">Salas</a></li>
          <li class="nav-item"><a class="nav-link active" href="cadastro-sessoes.html">Sessões</a></li>
          <li class="nav-item"><a class="nav-link" href="venda-ingressos.html">Ingressos</a></li>
          <li class="nav-item"><a class="nav-link" href="sessoes.html">Programação</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <h4 class="mb-4 fw-bold">📅 Cadastro de Sessões</h4>

    <div class="row g-4">

      <div class="col-lg-5">
        <div class="card">
          <div class="card-header">Nova Sessão</div>
          <div class="card-body">
            <form id="form-sessao" novalidate>

              <div class="mb-3">
                <label for="filme" class="form-label">Filme</label>
                <select id="filme" class="form-select" required>
                  <option value="">Carregando...</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="sala" class="form-label">Sala</label>
                <select id="sala" class="form-select" required>
                  <option value="">Carregando...</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="dataHora" class="form-label">Data e Hora</label>
                <input type="datetime-local" id="dataHora" class="form-control" required>
              </div>

              <div class="row g-2 mb-3">
                <div class="col">
                  <label for="preco" class="form-label">Preço (R$)</label>
                  <input type="number" id="preco" class="form-control"
                         placeholder="Ex: 25.00" min="0" step="0.01" required>
                </div>
                <div class="col">
                  <label for="idioma" class="form-label">Idioma</label>
                  <select id="idioma" class="form-select" required>
                    <option value="Dublado">Dublado</option>
                    <option value="Legendado">Legendado</option>
                  </select>
                </div>
              </div>

              <div class="mb-3">
                <label for="formato" class="form-label">Formato</label>
                <select id="formato" class="form-select" required>
                  <option value="2D">2D</option>
                  <option value="3D">3D</option>
                </select>
              </div>

              <button type="submit" class="btn btn-cinema w-100">Salvar Sessão</button>

              <div id="feedback" class="feedback-alert"></div>

            </form>
          </div>
        </div>
      </div>

      <div class="col-lg-7">
        <div class="card">
          <div class="card-header">Sessões Cadastradas</div>
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover mb-0">
                <thead>
                  <tr>
                    <th>Filme</th>
                    <th>Sala</th>
                    <th>Data / Hora</th>
                    <th>Preço</th>
                    <th>Sessão</th>
                  </tr>
                </thead>
                <tbody id="lista-sessoes"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <footer>
    <div class="container">CineSystem &copy; 2025</div>
  </footer>

  <script src="./js/bootstrap.bundle.min.js"></script>
  <script src="./js/storage.js"></script>
  <script src="./js/cadastro-sessoes.js"></script>

</body>
</html>
