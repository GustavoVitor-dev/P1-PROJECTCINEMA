<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Salas · CineSystem</title>
  <link href="./css/bootstrap.min.css" rel="stylesheet">
  <link href="./css/main-styles.css" rel="stylesheet">
</head>
<body>

  <!-- ===== Navbar ===== -->
  <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">🎬 CineSystem</a>
      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto gap-1">
          <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
          <li class="nav-item"><a class="nav-link" href="cadastro-filmes.html">Filmes</a></li>
          <li class="nav-item"><a class="nav-link active" href="cadastro-salas.html">Salas</a></li>
          <li class="nav-item"><a class="nav-link" href="cadastro-sessoes.html">Sessões</a></li>
          <li class="nav-item"><a class="nav-link" href="venda-ingressos.html">Ingressos</a></li>
          <li class="nav-item"><a class="nav-link" href="sessoes.html">Programação</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <h4 class="mb-4 fw-bold">🏛️ Cadastro de Salas</h4>

    <div class="row g-4">

      <div class="col-lg-4">
        <div class="card">
          <div class="card-header">Nova Sala</div>
          <div class="card-body">
            <form id="form-sala" novalidate>

              <div class="mb-3">
                <label for="nome" class="form-label">Nome da Sala</label>
                <input type="text" id="nome" class="form-control"
                       placeholder="Ex: Sala 1 — VIP" required>
              </div>

              <div class="mb-3">
                <label for="capacidade" class="form-label">Capacidade (lugares)</label>
                <input type="number" id="capacidade" class="form-control"
                       placeholder="Ex: 150" min="1" required>
              </div>

              <div class="mb-3">
                <label for="tipo" class="form-label">Tipo</label>
                <select id="tipo" class="form-select" required>
                  <option value="">Selecione</option>
                  <option value="2D">2D</option>
                  <option value="3D">3D</option>
                  <option value="IMAX">IMAX</option>
                </select>
              </div>

              <button type="submit" class="btn btn-cinema w-100">Salvar Sala</button>

              <div id="feedback" class="feedback-alert"></div>

            </form>
          </div>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="card">
          <div class="card-header">Salas Cadastradas</div>
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover mb-0">
                <thead>
                  <tr>
                    <th>Nome</th>
                    <th>Capacidade</th>
                    <th>Tipo</th>
                  </tr>
                </thead>
                <tbody id="lista-salas"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <footer>
    <div class="container">CineSystem &copy; 2025</div>
  </footer>

  <script src="./js/bootstrap.bundle.min.js"></script>
  <script src="./js/storage.js"></script>
  <script src="./js/salas.js"></script>

</body>
</html>
