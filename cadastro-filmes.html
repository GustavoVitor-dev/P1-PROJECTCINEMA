<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Filmes · CineSystem</title>
  <link href="./css/bootstrap.min.css" rel="stylesheet">
  <link href="./css/main-styles.css" rel="stylesheet">
</head>
<body>

  <!-- ===== Navbar ===== -->
  <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">🎬 CineSystem</a>
      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto gap-1">
          <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
          <li class="nav-item"><a class="nav-link active" href="cadastro-filmes.html">Filmes</a></li>
          <li class="nav-item"><a class="nav-link" href="cadastro-salas.html">Salas</a></li>
          <li class="nav-item"><a class="nav-link" href="cadastro-sessoes.html">Sessões</a></li>
          <li class="nav-item"><a class="nav-link" href="venda-ingressos.html">Ingressos</a></li>
          <li class="nav-item"><a class="nav-link" href="sessoes.html">Programação</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- ===== Conteúdo ===== -->
  <div class="container py-4">
    <h4 class="mb-4 fw-bold">🎞️ Cadastro de Filmes</h4>

    <div class="row g-4">

      <!-- Formulário -->
      <div class="col-lg-5">
        <div class="card">
          <div class="card-header">Novo Filme</div>
          <div class="card-body">
            <form id="form-filme" novalidate>

              <div class="mb-3">
                <label for="titulo" class="form-label">Título</label>
                <input type="text" id="titulo" class="form-control"
                       placeholder="Ex: Duna: Parte Dois" required>
              </div>

              <div class="mb-3">
                <label for="genero" class="form-label">Gênero</label>
                <select id="genero" class="form-select" required>
                  <option value="">Selecione</option>
                  <option>Ação</option>
                  <option>Aventura</option>
                  <option>Animação</option>
                  <option>Comédia</option>
                  <option>Drama</option>
                  <option>Ficção Científica</option>
                  <option>Horror</option>
                  <option>Romance</option>
                  <option>Suspense</option>
                  <option>Thriller</option>
                  <option>Documentário</option>
                  <option>Outros</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="descricao" class="form-label">Descrição</label>
                <textarea id="descricao" class="form-control" rows="3"
                          placeholder="Sinopse do filme..."></textarea>
              </div>

              <div class="mb-3">
                <label for="classificacao" class="form-label">Classificação Indicativa</label>
                <select id="classificacao" class="form-select" required>
                  <option value="">Selecione</option>
                  <option value="L">L — Livre</option>
                  <option value="10">10 anos</option>
                  <option value="12">12 anos</option>
                  <option value="14">14 anos</option>
                  <option value="16">16 anos</option>
                  <option value="18">18 anos</option>
                </select>
              </div>

              <div class="row g-2 mb-3">
                <div class="col">
                  <label for="duracao" class="form-label">Duração (min)</label>
                  <input type="number" id="duracao" class="form-control"
                         placeholder="Ex: 120" min="1" required>
                </div>
                <div class="col">
                  <label for="estreia" class="form-label">Data de Estreia</label>
                  <input type="date" id="estreia" class="form-control" required>
                </div>
              </div>

              <button type="submit" class="btn btn-cinema w-100">Salvar Filme</button>

              <div id="feedback" class="feedback-alert"></div>

            </form>
          </div>
        </div>
      </div>

      <!-- Listagem -->
      <div class="col-lg-7">
        <div class="card">
          <div class="card-header">Filmes Cadastrados</div>
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover mb-0">
                <thead>
                  <tr>
                    <th>Título</th>
                    <th>Gênero</th>
                    <th>Class.</th>
                    <th>Duração</th>
                    <th>Estreia</th>
                  </tr>
                </thead>
                <tbody id="lista-filmes"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <footer>
    <div class="container">CineSystem &copy; 2025</div>
  </footer>

  <script src="./js/bootstrap.bundle.min.js"></script>
  <script src="./js/storage.js"></script>
  <script src="./js/cadastro-filmes.js"></script>

</body>
</html>
